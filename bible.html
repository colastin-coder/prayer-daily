<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성경 구절 추천</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #faf9f7;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 1.5rem 1rem;
  }
  .wrap { width: 100%; max-width: 600px; }
  h1 { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #999; margin-bottom: 1.25rem; }
  textarea {
    width: 100%; min-height: 120px;
    padding: 12px 14px;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    font-size: 14px; color: #1a1a1a;
    background: #fff;
    resize: vertical; outline: none;
    line-height: 1.6;
    font-family: inherit;
    transition: border 0.15s;
    margin-bottom: 10px;
  }
  textarea:focus { border-color: #7c6fcd; }
  textarea::placeholder { color: #bbb; }
  .btn {
    width: 100%; padding: 11px;
    border-radius: 10px;
    border: none;
    background: #7c6fcd;
    color: #fff;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.15s;
    margin-bottom: 1.25rem;
  }
  .btn:hover { background: #6a5dbb; }
  .btn:disabled { background: #bbb; cursor: not-allowed; }
  .results { display: flex; flex-direction: column; gap: 10px; }
  .verse-card {
    background: #fff;
    border: 1px solid #ece9f8;
    border-left: 3px solid #7c6fcd;
    border-radius: 10px;
    padding: 14px 16px;
    animation: fadeIn 0.25s ease forwards;
    opacity: 0;
  }
  @keyframes fadeIn { to { opacity: 1; } }
  .verse-ref {
    font-size: 12px; font-weight: 700;
    color: #7c6fcd; margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  .verse-text {
    font-size: 14px; color: #222;
    line-height: 1.7; margin-bottom: 8px;
  }
  .verse-reason {
    font-size: 12px; color: #888;
    line-height: 1.5;
    border-top: 1px solid #f0edf9;
    padding-top: 8px;
  }
  .copy-btn {
    display: inline-flex; align-items: center; gap: 4px;
    margin-top: 8px; padding: 4px 10px;
    border: 1px solid #e0daf5;
    border-radius: 6px;
    background: #f7f5ff;
    color: #7c6fcd;
    font-size: 11px; font-weight: 500;
    cursor: pointer;
    transition: background 0.1s;
  }
  .copy-btn:hover { background: #ede9ff; }
  .msg { text-align: center; padding: 2rem 1rem; color: #aaa; font-size: 14px; line-height: 1.7; }
  .msg.error { color: #c0392b; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .token-row { margin-bottom: 1rem; }
  .token-row label { font-size: 12px; color: #999; display: block; margin-bottom: 4px; }
  .token-row input {
    width: 100%; padding: 8px 12px;
    border: 1px solid #e0e0e0; border-radius: 8px;
    font-size: 13px; color: #333;
    background: #fff; outline: none;
  }
  .token-row input:focus { border-color: #7c6fcd; }
</style>
</head>
<body>
<div class="wrap">
  <h1>📖 성경 구절 추천</h1>
  <p class="sub">기도 내용을 입력하면 관련 성경 구절 3개를 추천해 드립니다.</p>
  <div class="token-row">
    <label>Anthropic API Key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off" />
  </div>
  <textarea id="prayer" placeholder="기도 내용을 여기에 붙여넣거나 직접 입력하세요."></textarea>
  <button class="btn" id="btn" onclick="getSuggestions()">
    ✨ 성경 구절 추천받기
  </button>
  <div id="results" class="results"></div>
</div>
<script>
async function getSuggestions() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const prayer = document.getElementById('prayer').value.trim();
  const btn = document.getElementById('btn');
  const results = document.getElementById('results');
  if (!apiKey) { alert('Anthropic API Key를 입력해 주세요.\n(sk-ant-로 시작하는 키)'); return; }
  if (!prayer) { alert('기도 내용을 입력해 주세요.'); return; }
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> 추천 중...';
  results.innerHTML = '';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: '당신은 개혁주의 신학에 기반한 성경 전문가입니다. 사용자의 기도 내용을 읽고 가장 적합한 성경 구절 3개를 추천해주세요. 반드시 아래 JSON 형식으로만 응답하세요. 마크다운이나 설명 없이 순수 JSON만: {"verses":[{"ref":"시편 46:10","text":"너희는 가만히 있어 내가 하나님 됨을 알지어다","reason":"이 구절을 추천하는 이유를 1-2문장으로"}]} 규칙: 개역개정 성경 기준, 구절 텍스트는 정확하게, 이유는 기도 내용과 직접 연결되게, 시편 잠언 이사야 등 다양한 책에서 선택',
        messages: [{ role: 'user', content: '다음 기도 내용에 맞는 성경 구절 3개를 추천해주세요:\n\n' + prayer }]
      })
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || ('API 오류 ' + res.status));
    }
    const data = await res.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '';
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('응답 파싱 실패');
    const { verses } = JSON.parse(match[0]);
    if (!verses?.length) throw new Error('추천 결과 없음');
    verses.forEach((v, i) => {
      const card = document.createElement('div');
      card.className = 'verse-card';
      card.style.animationDelay = (i * 0.08) + 's';
      card.innerHTML =
        '<div class="verse-ref">' + v.ref + '</div>' +
        '<div class="verse-text">"' + v.text + '"</div>' +
        '<div class="verse-reason">' + v.reason + '</div>' +
        '<button class="copy-btn" onclick="copyVerse(\'' + v.ref + '\', \'' + v.text.replace(/'/g, "\\'") + '\')">📋 복사</button>';
      results.appendChild(card);
    });
    localStorage.setItem('anthropic_key_prayer', apiKey);
  } catch (err) {
    results.innerHTML = '<div class="msg error">추천 실패: ' + err.message + '</div>';
  }
  btn.disabled = false;
  btn.innerHTML = '✨ 성경 구절 추천받기';
}
function copyVerse(ref, text) {
  navigator.clipboard.writeText(ref + ' — ' + text).then(() => {
    alert('복사 완료! 노션 "관련 성경 구절" 칸에 붙여넣기 하세요.');
  });
}
window.onload = () => {
  const saved = localStorage.getItem('anthropic_key_prayer');
  if (saved) document.getElementById('apiKey').value = saved;
};
</script>
</body>
</html>
